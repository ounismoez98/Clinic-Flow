spring.application.name=demoApiGateway
server.port=8085


#eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Use JVM DNS resolver so Netty can resolve Windows hostnames like tim-inter.mshome.net
spring.cloud.gateway.httpclient.wiretap=false
reactor.netty.http.client.useNettyResolver=false

# CORS Configuration for the API Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Explicit route for Facture service
spring.cloud.gateway.routes[0].id=factures
spring.cloud.gateway.routes[0].uri=lb://msfacture
spring.cloud.gateway.routes[0].predicates[0]=Path=/factures/**

# --- Keycloak / OAuth2 Resource Server ---
# jwk-set-uri = where the gateway fetches Keycloak's public keys to verify token signatures.
# We point it at Keycloak's INTERNAL docker address (overridden by KEYCLOAK_ISSUER_URI env in docker).
# Locally (no docker) it defaults to localhost:8180.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/clinic-flow}/protocol/openid-connect/certs
