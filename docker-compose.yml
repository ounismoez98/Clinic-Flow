# Clinic-Flow — full stack with Docker Compose
#
# Infra only (RabbitMQ + MySQL, run apps locally with run-all-services.ps1):
#   docker compose up -d rabbitmq mysql
#
# Full stack (first run builds images — can take several minutes):
#   docker compose up -d --build
#
# Entry points:
#   Eureka:    http://localhost:8761
#   Gateway:   http://localhost:8085
#   RabbitMQ:  http://localhost:15672  (guest / guest)
#
# Optional: copy .env.example to .env and set GEMINI_API_KEY for MSPharmacie AI summary.

name: clinic-flow

x-build: &spring-build
  context: .
  dockerfile: docker/Dockerfile

x-spring-env: &spring-env
  SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: clinicflow-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Keycloak (identity provider) + its own Postgres database ---
  keycloak-db:
    image: postgres:16
    container_name: clinicflow-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - clinicflow_keycloak_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: clinicflow-keycloak
    hostname: keycloak
    command: start-dev --import-realm
    environment:
      # Admin console login (http://localhost:8180)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Connect Keycloak to its Postgres DB
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Tokens must say "issued by http://localhost:8180" so both browser and gateway agree
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8180"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      # The realm file in ./docker/keycloak is auto-imported on first start
      - ./docker/keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: clinicflow-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinic_pharmacie
    volumes:
      - clinicflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  eureka:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoEurekaServer
    container_name: clinicflow-eureka
    hostname: eureka
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  config-server:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoConfigServer
    container_name: clinicflow-config-server
    hostname: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_INSTANCE_HOSTNAME: config-server
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/MSPharmacie/default"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  mspharmacie:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSPharmacie
    container_name: clinicflow-mspharmacie
    hostname: mspharmacie
    ports:
      - "8086:8086"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: mspharmacie
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinic_pharmacie?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msordonnance:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSOrdonnance
    container_name: clinicflow-msordonnance
    hostname: msordonnance
    ports:
      - "8081:8081"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msordonnance
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mspharmacie:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msfacture:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MsFacture
    container_name: clinicflow-msfacture
    hostname: msfacture
    ports:
      - "8087:8087"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msfacture
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/clinique?createDatabaseIfNotExist=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  mspatientmedcin:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSPatientMedcin
    container_name: clinicflow-mspatientmedcin
    hostname: mspatientmedcin
    ports:
      - "8082:8082"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: mspatientmedcin
      # Keycloak admin API for auto-provisioning patient/doctor logins.
      # Uses the host-mapped 8180 port (via host.docker.internal) to avoid 8080.
      KEYCLOAK_ADMIN_BASE_URL: http://host.docker.internal:8180
      KEYCLOAK_ADMIN_REALM: clinic-flow
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - clinicflow_patient_h2:/app/Database/Data
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msuser:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSUser
    container_name: clinicflow-msuser
    hostname: msuser
    ports:
      - "8083:8083"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msuser
    volumes:
      - clinicflow_user_h2:/app/Database/Data
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  api-gateway:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoApiGateway
    container_name: clinicflow-api-gateway
    hostname: api-gateway
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      # Where the gateway fetches Keycloak's public keys to verify token signatures.
      # Uses the docker network name so the gateway container can reach Keycloak.
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/clinic-flow
    depends_on:
      keycloak:
        condition: service_healthy
      eureka:
        condition: service_healthy
      mspharmacie:
        condition: service_healthy
      msordonnance:
        condition: service_healthy
      mspatientmedcin:
        condition: service_healthy
      msuser:
        condition: service_healthy
      msrendezvous:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8085/"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

  # Async consumer: reacts to patient.event messages published by mspatientmedcin.
  # Runs on 8088 to avoid the 8086 clash with mspharmacie. No actuator -> no healthcheck.
  msnotification:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSNotification
    container_name: clinicflow-msnotification
    hostname: msnotification
    ports:
      - "8088:8088"
    environment:
      <<: *spring-env
      SERVER_PORT: "8088"
      EUREKA_INSTANCE_HOSTNAME: msnotification
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
      mspatientmedcin:
        condition: service_healthy

  frontend:
    build:
      context: ./clinic-flow-frontend
      dockerfile: Dockerfile
    container_name: clinicflow-frontend
    hostname: frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy

  msrendezvous:
    build:
      context: .
      dockerfile: docker/msrendezvous.Dockerfile
    container_name: clinicflow-msrendezvous
    hostname: msrendezvous
    ports:
      - "8089:8081"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: msrendezvous
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/Database/Data/RendezVous;DB_CLOSE_ON_EXIT=FALSE"
    volumes:
      - clinicflow_rendezvous_h2:/app/Database/Data
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  prometheus:
    image: prom/prometheus:latest
    container_name: clinicflow-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    container_name: clinicflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  clinicflow_mysql_data:
  clinicflow_patient_h2:
  clinicflow_user_h2:
  clinicflow_keycloak_db:
  clinicflow_rendezvous_h2:
