# Clinic-Flow — full stack with Docker Compose
#
# Infra only (RabbitMQ + MySQL, run apps locally with run-all-services.ps1):
#   docker compose up -d rabbitmq mysql
#
# Full stack (first run builds images — can take several minutes):
#   docker compose up -d --build
#
# Entry points:
#   Eureka:    http://localhost:8761
#   Gateway:   http://localhost:8085
#   RabbitMQ:  http://localhost:15672  (guest / guest)
#
# Optional: copy .env.example to .env and set GEMINI_API_KEY for MSPharmacie AI summary.

name: clinic-flow

x-build: &spring-build
  context: .
  dockerfile: docker/Dockerfile

x-spring-env: &spring-env
  SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: clinicflow-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Keycloak (identity provider) — uses its built-in H2 file database ---
  # H2 is Keycloak's dev default (fine for this project). Data is kept in a
  # volume so the realm/users survive restarts. Not for production use.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: clinicflow-keycloak
    hostname: keycloak
    command: start-dev --import-realm
    environment:
      # Admin console login (http://localhost:8180)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Use the built-in H2 file database (no separate DB container).
      KC_DB: dev-file
      # Tokens must say "issued by http://localhost:8180" so both browser and gateway agree
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8180"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      # Persist all Keycloak data (incl. the H2 database) so realm/users survive
      # restarts. Mounting the whole data dir keeps the keycloak user's write
      # permissions (a volume on the h2 subfolder alone is created root-owned).
      - clinicflow_keycloak_h2:/opt/keycloak/data
      # The realm file is auto-imported on first start (read-only bind inside data).
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: clinicflow-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinic_pharmacie
    volumes:
      - clinicflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  eureka:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoEurekaServer
    container_name: clinicflow-eureka
    hostname: eureka
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  config-server:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoConfigServer
    container_name: clinicflow-config-server
    hostname: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_INSTANCE_HOSTNAME: config-server
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/MSPharmacie/default"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  mspharmacie:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSPharmacie
    container_name: clinicflow-mspharmacie
    hostname: mspharmacie
    ports:
      - "8086:8086"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: mspharmacie
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinic_pharmacie?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msordonnance:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSOrdonnance
    container_name: clinicflow-msordonnance
    hostname: msordonnance
    ports:
      - "8081:8081"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msordonnance
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mspharmacie:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msfacture:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MsFacture
    container_name: clinicflow-msfacture
    hostname: msfacture
    ports:
      - "8087:8084"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msfacture
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/clinique?createDatabaseIfNotExist=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  mspatientmedcin:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSPatientMedcin
    container_name: clinicflow-mspatientmedcin
    hostname: mspatientmedcin
    ports:
      - "8082:8082"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: mspatientmedcin
      # Patient/doctor logins are provisioned via the Node identity service
      # (IDENTITY-SERVICE in Eureka). Shared secret for that internal call:
      IDENTITY_SERVICE_API_KEY: clinicflow-internal-secret
    volumes:
      - clinicflow_patient_h2:/app/Database/Data
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      # Provisions Keycloak logins via the Node identity service (Feign).
      identity-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  msuser:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSUser
    container_name: clinicflow-msuser
    hostname: msuser
    ports:
      - "8083:8083"
    environment:
      <<: *spring-env
      EUREKA_INSTANCE_HOSTNAME: msuser
    volumes:
      - clinicflow_user_h2:/app/Database/Data
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  api-gateway:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: demoApiGateway
    container_name: clinicflow-api-gateway
    hostname: api-gateway
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      # Where the gateway fetches Keycloak's public keys to verify token signatures.
      # Uses the docker network name so the gateway container can reach Keycloak.
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/clinic-flow
    depends_on:
      keycloak:
        condition: service_healthy
      eureka:
        condition: service_healthy
      mspharmacie:
        condition: service_healthy
      msordonnance:
        condition: service_healthy
      mspatientmedcin:
        condition: service_healthy
      msuser:
        condition: service_healthy
      msrendezvous:
        condition: service_healthy
      # Node identity service (no healthcheck -> wait for "started", not "healthy").
      identity-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8085/"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

  # Async consumer: reacts to patient.event messages published by mspatientmedcin.
  # Runs on 8090 to avoid port clashes. No actuator -> no healthcheck.
  msnotification:
    build:
      <<: *spring-build
      args:
        MODULE_DIR: MSNotification
    container_name: clinicflow-msnotification
    hostname: msnotification
    ports:
      - "8090:8090"
    environment:
      <<: *spring-env
      SERVER_PORT: "8090"
      EUREKA_INSTANCE_HOSTNAME: msnotification
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
      mspatientmedcin:
        condition: service_healthy

  # Node.js identity-management service (non-Spring). The single owner of
  # Keycloak admin operations. Registers in Eureka as IDENTITY-SERVICE so the
  # gateway routes /iam/** to it.
  identity-service:
    build:
      context: ./identity-management-node
      dockerfile: Dockerfile
    container_name: clinicflow-identity-service
    hostname: identity-service
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      # Fetch keys + call admin API on the internal docker address...
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: clinic-flow
      # ...but the token issuer stays localhost:8180 (that's what tokens carry).
      KEYCLOAK_ISSUER: http://localhost:8180/realms/clinic-flow
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      CORS_ORIGIN: http://localhost:4200
      INTERNAL_API_KEY: clinicflow-internal-secret
      # Register with Eureka under the container hostname.
      EUREKA_HOST: eureka
      EUREKA_PORT: "8761"
      SERVICE_HOSTNAME: identity-service
      SERVICE_NAME: IDENTITY-SERVICE
    depends_on:
      keycloak:
        condition: service_healthy
      eureka:
        condition: service_healthy

  frontend:
    build:
      context: ./clinic-flow-frontend
      dockerfile: Dockerfile
    container_name: clinicflow-frontend
    hostname: frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy

  msrendezvous:
    build:
      context: ./MSRendezVous
      dockerfile: Dockerfile
    container_name: clinicflow-msrendezvous
    hostname: msrendezvous
    ports:
      - "8084:8081"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: msrendezvous
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/Database/Data/RendezVous;DB_CLOSE_ON_EXIT=FALSE"
    volumes:
      - clinicflow_rendezvous_h2:/app/Database/Data
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  prometheus:
    image: prom/prometheus:latest
    container_name: clinicflow-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    container_name: clinicflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  clinicflow_mysql_data:
  clinicflow_patient_h2:
  clinicflow_user_h2:
  clinicflow_keycloak_h2:
  clinicflow_rendezvous_h2:
