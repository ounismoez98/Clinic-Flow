spring.application.name=MSOrdonnance
server.port=8081
welcome.message=Hello MS Ordonnance From Ordonnance
#spring.cloud.config.enabled=false
#spring.cloud.config.import-check.enabled=false
#config client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888
#ou bien * pour l'accs  tous les endpoints actuator
management.endpoints.web.exposure.include=refresh
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
# Datasource
spring.datasource.username=Maroua
spring.datasource.password=
#spring.datasource.url=jdbc:h2:file:./Database/Data/Ordonnance
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
