spring.application.name=MSOrdonnance
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
server.port=8081
welcome.message=Hello MS Ordonnance From Ordonnance
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
management.endpoints.web.exposure.include=refresh,health,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
# Datasource
spring.datasource.url=${DB_URL:jdbc:h2:file:./Database/Data/Ordonnance}
spring.datasource.username=Maroua
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
