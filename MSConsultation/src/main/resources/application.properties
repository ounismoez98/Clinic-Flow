spring.application.name=MSConsultation
server.port=8089
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Eureka Server Configuration
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false

# Management Endpoints (Actuator)
management.endpoints.web.exposure.include=health,refresh

# H2 Database Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true

# Datasource configuration (uses local H2 file database)
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./Database/Data/Consultation;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
