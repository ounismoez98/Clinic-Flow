name: Clinic-Flow CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [
          'demoEurekaServer',
          'demoConfigServer',
          'demoApiGateway',
          'MsFacture',
          'MSUser',
          'MSPatientMedcin',
          'MSPharmacie',
          'MSOrdonnance',
          'MSNotification'
        ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Service
      run: |
        cd ${{ matrix.service }}
        if [ -f mvnw ]; then
          chmod +x mvnw
          ./mvnw clean package -DskipTests
        else
          mvn clean package -DskipTests
        fi

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'clinic-flow-frontend/package-lock.json'

    - name: Build Frontend
      run: |
        cd clinic-flow-frontend
        npm ci
        npm run build -- --configuration=production
