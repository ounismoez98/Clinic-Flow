server.port=8086

welcome.message=sohail

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clinic_pharmacie?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

pharmacy.stock.low-threshold=5

gemini.base-url=https://generativelanguage.googleapis.com
gemini.model=gemini-flash-latest
gemini.api-key=${GEMINI_API_KEY:}
gemini.connect-timeout-ms=8000
gemini.read-timeout-ms=30000
