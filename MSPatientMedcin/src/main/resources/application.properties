spring.application.name=MSPatientMedcin
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888
management.endpoints.web.exposure.include=refresh,health,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Patient/doctor logins are now provisioned via the Node identity service
# (discovered through Eureka as IDENTITY-SERVICE). Shared secret for that call:
identity.service.api-key=${IDENTITY_SERVICE_API_KEY:clinicflow-internal-secret}
spring.h2.console.settings.web-allow-others=true

#jdbc url : jdbc:h2:file:./Database/Data/ClinicPatientMedcin
