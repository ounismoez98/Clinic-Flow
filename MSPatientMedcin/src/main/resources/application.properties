spring.application.name=MSPatientMedcin
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
server.port=8082

#Eureka registration
#awel ma yatlaa l'instance y'enregistry rouhou fel eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.prefer-ip-address: true
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Datasource
spring.datasource.username=islem
spring.datasource.password=
spring.datasource.url=jdbc:h2:file:./Database/Data/ClinicPatientMedcin;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect