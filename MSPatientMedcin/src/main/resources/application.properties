spring.application.name=MSPatientMedcin
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888
management.endpoints.web.exposure.include=refresh,health

spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Keycloak admin API (for auto-provisioning patient/doctor logins).
# Overridden in docker via KEYCLOAK_ADMIN_* env vars.
keycloak.admin.base-url=${KEYCLOAK_ADMIN_BASE_URL:http://localhost:8180}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:clinic-flow}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
spring.h2.console.settings.web-allow-others=true

#jdbc url : jdbc:h2:file:./Database/Data/ClinicPatientMedcin
