spring.application.name=MSRendezVous
server.port=8081
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Eureka — defaults to localhost for local dev; Docker overrides via EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false

# Actuator
management.endpoints.web.exposure.include=health,refresh,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true
# Datasource — file path overridden in Docker via SPRING_DATASOURCE_URL
spring.datasource.username=Moez
spring.datasource.password=
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./Database/Data/RendezVous;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
